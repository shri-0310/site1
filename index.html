<!DOCTYPE html>
<html>
<head>
    <title>My Jenkins Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            text-align: center;
            background: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #007BFF;
        }
        .container {
            text-align: center;
            margin-top: 80px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>My Jenkins Site</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Welcome to My Website </h2>
    <p>This site is deployed using Jenkins CI/CD.</p>
    <a href="contact.html" class="btn">Contact Me</a>
</div>

</html>
